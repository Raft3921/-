<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ラフトの冒険 - ホーム</title>
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  
  <div id="container">
    <h1>ラフトの冒険</h1>
    <button id="createWorld">新しいワールド</button>
    <button id="settingsBtn">設定</button>
    <div id="slotsContainer">
      <div id="slots"></div>
    </div>
    <div id="navigation">
      <button id="prevBtn">← 前へ</button>
      <span id="pageInfo">1 / 1</span>
      <button id="nextBtn">次へ →</button>
    </div>
  </div>
  <script src="home.js"></script>
  <div id="message" style="position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#fff;padding:8px 16px;border-radius:8px;color:#1a2a4f;display:none;z-index:9999;font-weight:bold"></div>
</body>
</html>
